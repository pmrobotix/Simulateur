<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PMX Viewer</title>

    <link rel="stylesheet" href="css/visualisator.css">

    <script src="libs/jquery.min.js"></script>
    <script src="libs/createjs.min.js"></script>
    <script src="libs/tweenjs.min.js"></script>
    <script src="libs/geometric.js"></script>
    <script src="javascript/currentYear.js"></script>
    <script src="javascript/visualisator.js"></script>
</head>

<body onload="init(currentYear, rotateTable);">

<div class="outsideWrapper">
    <div class="insideWrapper">
        <img id="table" alt="table" class="coveredImage" style="cursor: pointer; opacity: 0.7;" onclick="toggleZones();" title="Clic pour afficher/masquer les zones">
        <canvas id="canvas" class="coveringCanvas" width="3000" height="2000"></canvas>
    </div>
</div>

<div class="configBlock">
    <div class="formBlock">
        <fieldset>
            <legend>Configuration</legend>
            <div>
                <button onclick="showZones();">Zones</button>
                <button onclick="showGrid();">Quadrillage</button>
            </div>
            <div style="margin-top:10px;">
                <label for="tableOpacity">Opacite table : <span id="opacityVal">70%</span></label>
                <br>
                <input type="range" id="tableOpacity" min="0" max="100" value="70" style="width:300px;"
                    oninput="document.getElementById('table').style.opacity = this.value / 100;
                             document.getElementById('opacityVal').textContent = this.value + '%';">
            </div>
            <div style="margin-top:10px;">
                <label for="zonesOpacity">Opacite zones : <span id="zonesOpacityVal">60%</span></label>
                <br>
                <input type="range" id="zonesOpacity" min="0" max="100" value="60" style="width:300px;"
                    oninput="setZonesOpacity(this.value / 100);
                             document.getElementById('zonesOpacityVal').textContent = this.value + '%';">
            </div>
            <div style="margin-top:10px;">
                <label for="gridOpacity">Opacite quadrillage : <span id="gridOpacityVal">60%</span></label>
                <br>
                <input type="range" id="gridOpacity" min="0" max="100" value="60" style="width:300px;"
                    oninput="setGridOpacity(this.value / 100);
                             document.getElementById('gridOpacityVal').textContent = this.value + '%';">
            </div>
            <div>
                <button onclick="loadStratColor('bleu');">Strat Bleu</button>
                <button onclick="loadStratColor('jaune');">Strat Jaune</button>
            </div>
        </fieldset>
    </div>

    <form id="formTable" name="formTable" class="formBlock" onsubmit="event.preventDefault(); loadFiles();">
        <fieldset>
            <legend>Configuration</legend>
            <div>
                <input type="file"
                       id="stratLog" name="stratLog"
                       class="inputfile"
                       data-multiple-caption="{count} files selected"/>
                <label for="stratLog"><span>Strat Log PMX</span></label>
            </div>

            <div>
                <button type="submit">Envoyer</button>
            </div>
        </fieldset>
    </form>

    <div class="instructionsBlock">
        <fieldset>
            <legend>Instructions</legend>
            <table>
                <tr>
                    <th>PMX</th>
                    <th>Autre</th>
                </tr>
                <tr>
                    <td><button id="pmxNext" onclick="nextInstruction();" disabled>Suivant</button></td>
                    <td><button onclick="connectSocket();">Live</button></td>
                </tr>
                <tr>
                    <td><button id="pmxAuto" onclick="autoPlay();" disabled>Automatique</button></td>
                    <td><button onclick="autoPlay();">Full auto</button></td>
                </tr>
            </table>

        </fieldset>
        <fieldset>
            <legend>Déplacement manuel</legend>
            <table>
                <tr>
                    <th>Robot</th>
                    <th>X (mm)</th>
                    <th>Y (mm)</th>
                    <th>Theta (°)</th>
                    <th></th>
                </tr>
                <tr>
                    <td>PMX</td>
                    <td>
                        <input style="width: 100px;" name="pmx-x" id="pmx-x" type="number"/>
                    </td>
                    <td>
                        <input style="width: 100px;" name="pmx-y" id="pmx-y" type="number"/>
                    </td>
                    <td>
                        <input style="width: 100px;" name="pmx-theta" id="pmx-theta" type="number"/>
                    </td>
                    <td>
                        <button style="width: 150px;" onclick="moveRobot(
                            document.getElementById('pmx-x').value,
                            document.getElementById('pmx-y').value,
                            document.getElementById('pmx-theta').value * Math.PI / 180
                        );">
                            Go
                        </button>
                    </td>
                </tr>
            </table>
        </fieldset>
    </div>

    <table class="dataBlock">
        <tr>
            <th>Exécution PMX</th>
        </tr>
        <tr>
            <td id="data" class="dataFieldset"></td>
        </tr>
    </table>
</div>

</body>
</html>
